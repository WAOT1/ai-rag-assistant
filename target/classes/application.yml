spring:
  application:
    name: ai-rag-assistant
  datasource:
    url: jdbc:mysql://localhost:3306/rag_kb?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8081

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
    banner: false

# DeepSeek AI 配置
deepseek:
  api-key: sk-36e8b44e213e4fe6be28feb14740d9c0
  base-url: https://api.deepseek.com
  model: deepseek-chat
  embedding-model: text-embedding-ada-002

# RAG 配置
rag:
  chunk-size: 500
  chunk-overlap: 50
  top-k: 5
  similarity-threshold: 0.7
