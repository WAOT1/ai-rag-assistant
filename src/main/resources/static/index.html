<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI RAG 知识库助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        h1 { font-size: 48px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .subtitle { font-size: 20px; margin-bottom: 50px; opacity: 0.9; }
        .cards {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: rgba(255,255,255,0.95);
            color: #333;
            padding: 40px 30px;
            border-radius: 20px;
            width: 280px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .card-icon { font-size: 60px; margin-bottom: 20px; }
        .card h2 { font-size: 24px; margin-bottom: 10px; color: #11998e; }
        .card p { font-size: 14px; color: #666; line-height: 1.6; }
        .features {
            margin-top: 50px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .feature {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 AI RAG 知识库助手</h1>
        <p class="subtitle">基于检索增强生成（RAG）的智能文档问答系统</p>
        
        <div class="cards">
            <a href="upload.html" class="card">
                <div class="card-icon">📄</div>
                <h2>文档管理</h2>
                <p>上传 PDF/Word/TXT<br>自动切片向量化<br>文档列表管理</p>
            </a>
            
            <a href="chat.html" class="card">
                <div class="card-icon">💬</div>
                <h2>知识库问答</h2>
                <p>基于文档内容回答<br>标注答案来源<br>多轮对话</p>
            </a>
        </div>
        
        <div class="features">
            <div class="feature">✅ 本地 ONNX Embedding</div>
            <div class="feature">✅ 语义检索</div>
            <div class="feature">✅ 引用溯源</div>
            <div class="feature">✅ 多轮对话</div>
        </div>
    </div>
</body>
</html>
