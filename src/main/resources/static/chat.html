<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库问答 - AI RAG 知识库助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 28px; }
        .back { position: absolute; left: 20px; top: 20px; color: white; text-decoration: none; font-size: 16px; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: flex; gap: 20px; }
        .chat-panel {
            flex: 1;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            height: 75vh;
        }
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header .avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }
        .chat-header h3 { color: #333; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .message.user { flex-direction: row-reverse; }
        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
        }
        .message.ai .message-bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .message.user .message-bubble {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .message.ai .message-avatar { background: #e8e8e8; }
        .message.user .message-avatar { background: #11998e; color: white; }
        .sources {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 3px solid #11998e;
        }
        .sources h4 { font-size: 12px; color: #666; margin-bottom: 8px; }
        .source-item {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            padding: 5px;
            background: white;
            border-radius: 4px;
        }
        .source-item .score { color: #11998e; font-weight: bold; }
        .chat-input {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        .chat-input input:focus { border-color: #11998e; }
        .chat-input button {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }
        .chat-input button:hover { transform: scale(1.05); }
        .chat-input button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .side-panel { width: 300px; }
        .panel-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .panel-card h3 { color: #333; margin-bottom: 15px; font-size: 16px; }
        .quick-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 13px;
            transition: all 0.2s;
        }
        .quick-btn:hover { background: #f0f0f0; border-color: #11998e; }
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
        .typing span {
            width: 8px; height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .rag-flow {
            font-size: 12px;
            color: #666;
            line-height: 1.8;
        }
        .rag-flow .step {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .rag-flow .step-icon {
            width: 24px; height: 24px;
            background: #e8f5e9;
            color: #11998e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        .session-info {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .side-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back">← 返回首页</a>
        <h1>💬 知识库问答</h1>
    </div>
    
    <div class="container">
        <div class="chat-panel">
            <div class="chat-header">
                <div class="avatar">📚</div>
                <div>
                    <h3>RAG 知识库助手</h3>
                    <p style="font-size: 12px; color: #666;">基于文档内容的智能问答</p>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message ai">
                    <div class="message-avatar">📚</div>
                    <div class="message-bubble">
                        你好！我是 RAG 知识库助手。<br>
                        请先<a href="upload.html" style="color:#11998e;">上传文档</a>，然后我可以基于文档内容回答你的问题。<br>
                        我会标注答案来源，让你知道信息来自哪里。
                    </div>
                </div>
            </div>
            
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
        
        <div class="side-panel">
            <div class="panel-card">
                <h3>💡 快速提问</h3>
                <button class="quick-btn" onclick="quickAsk('文档里讲了什么？')">文档里讲了什么？</button>
                <button class="quick-btn" onclick="quickAsk('总结一下主要内容')">总结一下主要内容</button>
                <button class="quick-btn" onclick="quickAsk('有哪些关键点？')">有哪些关键点？</button>
                <button class="quick-btn" onclick="quickAsk('详细说明一下')">详细说明一下</button>
            </div>
            
            <div class="panel-card">
                <h3>🔄 RAG 流程</h3>
                <div class="rag-flow">
                    <div class="step">
                        <div class="step-icon">1</div>
                        <div>接收用户问题</div>
                    </div>
                    <div class="step">
                        <div class="step-icon">2</div>
                        <div>问题向量化</div>
                    </div>
                    <div class="step">
                        <div class="step-icon">3</div>
                        <div>向量检索 Top-K</div>
                    </div>
                    <div class="step">
                        <div class="step-icon">4</div>
                        <div>拼接 Prompt</div>
                    </div>
                    <div class="step">
                        <div class="step-icon">5</div>
                        <div>AI 生成回答</div>
                    </div>
                    <div class="step">
                        <div class="step-icon">6</div>
                        <div>返回 + 引用溯源</div>
                    </div>
                </div>
                <div class="session-info">
                    会话 ID: <span id="sessionId">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8081';
        const messagesDiv = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let sessionId = localStorage.getItem('rag_session_id') || generateSessionId();
        document.getElementById('sessionId').textContent = sessionId;

        function generateSessionId() {
            const id = 'session-' + Date.now();
            localStorage.setItem('rag_session_id', id);
            return id;
        }

        function addMessage(role, content, sources) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            let sourcesHtml = '';
            if (sources && sources.length > 0) {
                sourcesHtml = `
                    <div class="sources">
                        <h4>📎 引用来源</h4>
                        ${sources.map((s, i) => `
                            <div class="source-item">
                                ${i + 1}. ${s.documentTitle} 
                                <span class="score">(相似度: ${(s.score * 100).toFixed(1)}%)</span><br>
                                <span style="color:#999;">${s.content}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            msgDiv.innerHTML = `
                <div class="message-avatar">${role === 'ai' ? '📚' : '👤'}</div>
                <div class="message-bubble">${content}${sourcesHtml}</div>
            `;
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai typing-indicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">📚</div>
                <div class="message-bubble">
                    <div class="typing">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            typingDiv.id = 'typingIndicator';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            userInput.value = '';
            addMessage('user', text);
            
            sendBtn.disabled = true;
            showTyping();
            
            try {
                const res = await fetch(`${API_BASE}/api/rag/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: text,
                        sessionId: sessionId
                    })
                });
                const data = await res.json();
                
                hideTyping();
                
                if (data.code === 200) {
                    addMessage('ai', data.data.answer, data.data.sources);
                } else {
                    addMessage('ai', `抱歉，请求失败: ${data.message}`);
                }
            } catch (e) {
                hideTyping();
                addMessage('ai', `抱歉，服务暂时不可用: ${e.message}`);
            }
            
            sendBtn.disabled = false;
        }

        function quickAsk(text) {
            userInput.value = text;
            sendMessage();
        }
    </script>
</body>
</html>
