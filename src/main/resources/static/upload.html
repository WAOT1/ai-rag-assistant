<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档管理 - AI RAG 知识库助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 28px; }
        .back { position: absolute; left: 20px; top: 20px; color: white; text-decoration: none; font-size: 16px; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .panel {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .panel h2 { color: #333; margin-bottom: 20px; font-size: 20px; }
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 16px;
            padding: 60px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #11998e;
            background: #f0fdf4;
        }
        .upload-area .icon { font-size: 60px; margin-bottom: 15px; }
        .upload-area p { color: #666; margin-bottom: 10px; }
        .upload-area .hint { font-size: 12px; color: #999; }
        .upload-area input { display: none; }
        .btn {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .progress {
            margin-top: 20px;
            display: none;
        }
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
        .doc-list {
            margin-top: 20px;
        }
        .doc-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .doc-item:hover { background: #f9f9f9; }
        .doc-icon { font-size: 36px; margin-right: 15px; }
        .doc-info { flex: 1; }
        .doc-info h4 { color: #333; margin-bottom: 5px; }
        .doc-info p { font-size: 12px; color: #999; }
        .doc-status {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin-right: 10px;
        }
        .doc-status.ready { background: #d4edda; color: #155724; }
        .doc-status.processing { background: #fff3cd; color: #856404; }
        .doc-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        .result.success { background: #d4edda; color: #155724; display: block; }
        .result.error { background: #f8d7da; color: #721c24; display: block; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .empty-state .icon { font-size: 60px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back">← 返回首页</a>
        <h1>📄 文档管理</h1>
    </div>
    
    <div class="container">
        <div class="panel">
            <h2>📤 上传文档</h2>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()" id="uploadArea">
                <div class="icon">📁</div>
                <p>点击或拖拽文件到此处上传</p>
                <p class="hint">支持 PDF、Word、TXT、Markdown（最大 50MB）</p>
                <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt,.md" onchange="handleFileSelect(event)">
            </div>
            
            <div class="progress" id="progress">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-text" id="progressText">正在上传... 0%</div>
            </div>
            
            <div id="uploadResult" class="result"></div>
        </div>

        <div class="panel">
            <h2>📋 文档列表</h2>
            <div id="docList" class="doc-list">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>暂无文档，请上传</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8081';

        // 拖拽上传
        const uploadArea = document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) uploadFile(files[0]);
        });

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) uploadFile(file);
        }

        async function uploadFile(file) {
            const progress = document.getElementById('progress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const result = document.getElementById('uploadResult');

            progress.style.display = 'block';
            result.className = 'result';

            const formData = new FormData();
            formData.append('file', file);

            try {
                // 模拟进度
                let p = 0;
                const interval = setInterval(() => {
                    p += 10;
                    if (p >= 90) clearInterval(interval);
                    progressFill.style.width = p + '%';
                    progressText.textContent = `正在上传... ${p}%`;
                }, 200);

                const res = await fetch(`${API_BASE}/api/rag/documents/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                clearInterval(interval);
                progressFill.style.width = '100%';
                progressText.textContent = '上传完成！';

                if (data.code === 200) {
                    result.className = 'result success';
                    result.innerHTML = `
                        <h3>✅ 上传成功</h3>
                        <p>文档: ${data.data.title}</p>
                        <p>切片数: ${data.data.chunkCount}</p>
                    `;
                    loadDocuments();
                } else {
                    result.className = 'result error';
                    result.innerHTML = `<h3>❌ 上传失败</h3><p>${data.message}</p>`;
                }
            } catch (e) {
                result.className = 'result error';
                result.innerHTML = `<h3>❌ 错误</h3><p>${e.message}</p>`;
            }

            setTimeout(() => {
                progress.style.display = 'none';
                progressFill.style.width = '0%';
            }, 2000);
        }

        async function loadDocuments() {
            try {
                const res = await fetch(`${API_BASE}/api/rag/documents`);
                const data = await res.json();

                const listDiv = document.getElementById('docList');

                if (data.code === 200 && data.data && data.data.length > 0) {
                    listDiv.innerHTML = data.data.map(doc => `
                        <div class="doc-item">
                            <div class="doc-icon">${getFileIcon(doc.fileType)}</div>
                            <div class="doc-info">
                                <h4>${doc.title}</h4>
                                <p>${doc.fileName} | ${formatSize(doc.fileSize)} | ${doc.createTime}</p>
                            </div>
                            <div class="doc-status ready">✓ 已就绪</div>
                            <button class="doc-delete" onclick="deleteDoc(${doc.id})">删除</button>
                        </div>
                    `).join('');
                } else {
                    listDiv.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>暂无文档，请上传</p>
                        </div>
                    `;
                }
            } catch (e) {
                console.error('加载文档失败:', e);
            }
        }

        async function deleteDoc(id) {
            if (!confirm('确定要删除这个文档吗？')) return;

            try {
                const res = await fetch(`${API_BASE}/api/rag/documents/${id}`, {
                    method: 'DELETE'
                });
                const data = await res.json();

                if (data.code === 200) {
                    loadDocuments();
                }
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }

        function getFileIcon(type) {
            const icons = {
                'pdf': '📕',
                'word': '📘',
                'txt': '📄',
                'markdown': '📝'
            };
            return icons[type] || '📄';
        }

        function formatSize(bytes) {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 页面加载时获取文档列表
        loadDocuments();
    </script>
</body>
</html>
